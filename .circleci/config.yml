version: 2.1
jobs:
  build:
    machine:
      image: ubuntu-2404:current
    steps:
      - checkout
      - run:
          command: "echo \"\$nrconf{restart} = 'a';\" | sudo tee disable.conf"
          working_directory: /etc/needrestart/conf.d/
      - run: "sudo apt update"
      - run: "sudo apt install valgrind"
      - run: "git clone git@github.com:ThrowTheSwitch/Unity.git"
      - run:
          command: "cc -c unity.c"
          working_directory: ./Unity/src/
      - run:
          command: "make exec_tests"
          environment:
            UNITY_DIR: ./Unity/
            CC: cc
      - store_test_results:
          path: test_outputs
      - store_artifacts:
          path: test_outputs
